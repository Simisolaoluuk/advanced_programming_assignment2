<!doctype html>
<html>
  <head>
    <title>UK Companies Explorer</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f6fbff;
        --panel: #ffffff;
        --accent: #1f4a8a;
        --accent-soft: #eaf2fc;
        --text: #102a43;
        --border: #d8e3ef;
        --shadow: rgba(31, 74, 138, 0.16);
      }

      * {
        box-sizing: border-box;
      }

      html, body {
        margin: 0;
        min-height: 100%;
        font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
        background: linear-gradient(180deg, #e8f1ff 0%, #f9fcff 100%);
        color: var(--text);
      }

      body {
        padding: 24px;
      }

      .page-shell {
        max-width: 1060px;
        margin: 0 auto;
        padding: 24px;
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 24px;
        box-shadow: 0 22px 50px var(--shadow);
      }

      header {
        display: grid;
        gap: 14px;
        padding-bottom: 20px;
        border-bottom: 1px solid var(--border);
        margin-bottom: 24px;
      }

      header h1 {
        margin: 0;
        font-size: clamp(2.1rem, 2.7vw, 3rem);
        letter-spacing: -0.04em;
        color: var(--accent);
      }

      .nav-links {
        display: inline-flex;
        flex-wrap: wrap;
        gap: 12px;
        padding: 12px 14px;
        border-radius: 999px;
        background: var(--accent-soft);
      }

      .nav-links a {
        color: var(--accent);
        text-decoration: none;
        font-weight: 600;
        transition: color 0.2s ease, transform 0.2s ease;
      }

      .nav-links a:hover {
        color: #0f2f66;
        transform: translateY(-1px);
      }

      .table-panel {
        width: 100%;
        overflow-x: auto;
        border-radius: 18px;
        border: 1px solid var(--border);
        background: linear-gradient(180deg, #ffffff 0%, #f7fbff 100%);
        box-shadow: inset 0 0 0 1px rgba(31, 74, 138, 0.03);
        padding: 18px;
      }

      .table-panel::before {
        content: "";
        display: block;
        width: 100%;
        height: 6px;
        margin-bottom: 18px;
        border-radius: 999px;
        background: linear-gradient(90deg, #1f4a8a 0%, #6ea4ff 100%);
      }

      .content-block {
        display: grid;
        gap: 20px;
      }

      hr {
        border: none;
        border-top: 1px solid var(--border);
        margin: 0;
      }

      @media (max-width: 720px) {
        body {
          padding: 16px;
        }

        .page-shell {
          padding: 18px;
        }
      }
    </style>
  </head>
  <body>
    <div class="page-shell">
      <header>
        <h1>UK Companies Explorer</h1>
        <nav class="nav-links">
          <a href="/">Home</a>
          <a href="/companies">Companies</a>
          <a href="/statuses">Statuses</a>
        </nav>
      </header>

      <div class="table-panel">
        <div class="content-block">
          {% block content %}{% endblock %}
        </div>
      </div>
    </div>
  </body>
</html>
