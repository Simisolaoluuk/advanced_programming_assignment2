{% extends "base.html" %}

{% block content %}
<h2>Companies</h2>
<div class="search-block">
  <label for="company-search">Search companies</label>
  <input
    id="company-search"
    type="search"
    placeholder="Type a company name or status…"
    aria-label="Search companies"
  />
</div>
<ul id="company-list">
  {% for c in companies %}
    <li>
      <a href="/companies/{{ c.id }}">{{ c.name }}</a>
      ({{ c.status.status_name }})
    </li>
  {% endfor %}
</ul>
<p id="no-results" class="hidden">No companies match your search.</p>

<script>
  const searchInput = document.getElementById('company-search');
  const companyList = document.getElementById('company-list');
  const noResults = document.getElementById('no-results');

  function updateCompanyFilter() {
    const query = searchInput.value.trim().toLowerCase();
    let visibleCount = 0;

    companyList.querySelectorAll('li').forEach(item => {
      const text = item.textContent.toLowerCase();
      const matches = !query || text.includes(query);
      item.style.display = matches ? '' : 'none';
      if (matches) visibleCount += 1;
    });

    noResults.classList.toggle('hidden', visibleCount > 0);
  }

  searchInput.addEventListener('input', updateCompanyFilter);
  searchInput.addEventListener('search', updateCompanyFilter);
</script>

<style>
  .search-block {
    display: grid;
    gap: 10px;
    margin-bottom: 20px;
  }

  .search-block label {
    font-weight: 600;
    color: #1f4a8a;
  }

  #company-search {
    width: 100%;
    max-width: 540px;
    border: 1px solid #d8e3ef;
    border-radius: 14px;
    padding: 12px 14px;
    font-size: 1rem;
    background: #ffffff;
    color: #102a43;
    box-shadow: inset 0 1px 2px rgba(16, 42, 67, 0.08);
  }

  #company-list {
    list-style: none;
    padding: 0;
    margin: 0;
    display: grid;
    gap: 12px;
  }

  #company-list li {
    padding: 14px 16px;
    border: 1px solid #d8e3ef;
    border-radius: 16px;
    background: #ffffff;
  }

  #company-list a {
    color: #1f4a8a;
    text-decoration: none;
    font-weight: 600;
  }

  .hidden {
    display: none;
  }
</style>
{% endblock %}
